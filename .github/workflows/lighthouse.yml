name: Lighthouse CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: |
          node server.js > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become healthy in time"
          cat server.log || true
          exit 1

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Publish Lighthouse dashboard links
        if: always()
        env:
          LINKS: ${{ steps.lighthouse.outputs.links }}
        run: |
          node -e '
            const fs = require("node:fs");
            const summaryPath = process.env.GITHUB_STEP_SUMMARY;
            const raw = process.env.LINKS || "[]";
            let links;
            try {
              links = JSON.parse(raw);
            } catch {
              links = [];
            }
            const lines = [
              "## Lighthouse Temporary Dashboard",
              links.length
                ? links.map((link, idx) => `${idx + 1}. ${link}`).join("\\n")
                : "No dashboard links emitted by Lighthouse CI."
            ];
            fs.appendFileSync(summaryPath, `${lines.join("\\n\\n")}\\n`);
          '

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi
